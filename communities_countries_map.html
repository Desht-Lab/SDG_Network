  function init() {

      }
    });
    Plotly.restyle(gd,
      { lon: [allLons], lat: [allLats],
         'line.color': 'rgba(100,100,100,' + G.edgeOpacity + ')' },
      [EDGE_BG]);

    // clear hi edges
    Plotly.restyle(gd, { lon: [[null]], lat: [[null]] }, [EDGE_HI]);
  }

  setTimeout(init, 400);
})();
</script>
