      if (selected !== null) resetAll(gd);
      // return nothing → default legend toggle fires normally
    });
    gd.on('plotly_legenddoubleclick', function() {
      if (selected !== null) resetAll(gd);
    });

    gd.on('plotly_doubleclick', function() { resetAll(gd); });
  }

  // ── highlight ──────────────────────────────────────────────────────────────
  function highlight(gd, iso) {
    selected = iso;
    var nbrs = new Set(G.adj[iso] || []);
    nbrs.add(iso);

    // restyle each community trace: bright neighbours, dim others
    for (var ci = 0; ci < G.nCommTraces; ci++) {
      var ti    = COMM_START + ci;
      var trace = gd.data[ti];
      if (!trace || !trace.customdata) continue;
      var op = trace.customdata.map(function(cd) {
        return nbrs.has(cd) ? 0.92 : 0.07;
      });
      Plotly.restyle(gd, {'marker.opacity': [op]}, [ti]);
    }

    // highlight edges for clicked node
    var hiLons = [], hiLats = [], bgLons = [], bgLats = [];
    G.edgeList.forEach(function(e) {
      var u = e[0], v = e[1];
      if (!G.pos[u] || !G.pos[v]) return;
      var isHi = (u === iso || v === iso);
      var ls = isHi ? hiLons : bgLons;
      var lt = isHi ? hiLats : bgLats;
      ls.push(G.pos[u][0], G.pos[v][0], null);
      lt.push(G.pos[u][1], G.pos[v][1], null);
    });

    Plotly.restyle(gd,
      { lon: [hiLons.length ? hiLons : [null]],
         lat: [hiLats.length ? hiLats : [null]] },
      [EDGE_HI]);
    Plotly.restyle(gd,
      { lon: [bgLons.length ? bgLons : [null]],
         lat: [bgLats.length ? bgLats : [null]],
         'line.color': 'rgba(120,120,120,0.05)' },
      [EDGE_BG]);
  }

  // ── reset ──────────────────────────────────────────────────────────────────
  function resetAll(gd) {
    selected = null;

    // restore all community traces to scalar opacity
    for (var ci = 0; ci < G.nCommTraces; ci++) {
      Plotly.restyle(gd, {'marker.opacity': 0.92}, [COMM_START + ci]);
    }

    // restore bg edges
    var allLons = [], allLats = [];
    G.edgeList.forEach(function(e) {
      var u = e[0], v = e[1];
      if (G.pos[u] && G.pos[v]) {
        allLons.push(G.pos[u][0], G.pos[v][0], null);
        allLats.push(G.pos[u][1], G.pos[v][1], null);
      }
    });
    Plotly.restyle(gd,
      { lon: [allLons], lat: [allLats],
         'line.color': 'rgba(100,100,100,' + G.edgeOpacity + ')' },
      [EDGE_BG]);

    // clear hi edges
    Plotly.restyle(gd, { lon: [[null]], lat: [[null]] }, [EDGE_HI]);
  }

  setTimeout(init, 400);
})();
</script>
