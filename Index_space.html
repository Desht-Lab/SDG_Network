<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index SDG Network (nodes.json)</title>
  <script src="https://cdn.jsdelivr.net/npm/d3plus@2"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }

    .viz-shell {
      height: calc(100vh - 64px);
      padding: 10px;
      background: var(--bg);
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .filter-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .filter-header {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .filter-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .filter-help,
    .filter-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .filter-summary {
      margin-top: 6px;
    }

    .filter-controls {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 10px;
    }

    .filter-search {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
    }

    .filter-select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
    }

    .filter-actions {
      display: flex;
      gap: 8px;
    }

    .filter-inline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .filter-button {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .filter-button:hover {
      background: #f9fafb;
    }

    .filter-button-small {
      min-width: 72px;
    }

    .filter-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .filter-item {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #ffffff;
      cursor: pointer;
    }

    .filter-item:hover {
      background: #f9fafb;
    }

    .filter-item input {
      margin: 2px 0 0;
    }

    .filter-item-id {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    .filter-item-label {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .filter-empty {
      padding: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .cluster-chart {
      flex: 0 0 auto;
      min-height: 0;
      max-height: 320px;
      overflow: auto;
      padding: 12px 14px 14px;
      border-bottom: 1px solid var(--border);
      background: #fbfcfe;
    }

    .cluster-chart-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .cluster-chart-help {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .cluster-chart-empty {
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .cluster-chart-list {
      display: grid;
      gap: 10px;
    }

    .cluster-chart-row {
      display: grid;
      gap: 6px;
    }

    .cluster-chart-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .cluster-chart-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
    }

    .cluster-chart-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .cluster-chart-meta {
      flex: 0 0 auto;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      white-space: nowrap;
    }

    .cluster-chart-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .cluster-chart-fill {
      height: 100%;
      border-radius: 999px;
    }

    #viz {
      width: 100%;
      height: 100%;
      background: var(--panel);
      border: 0;
      border-radius: 8px;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 260px minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Index SDG Network</div>
    <div id="status" class="status">Loading data...</div>
  </div>
  <div class="viz-shell">
    <div class="layout">
      <aside class="panel filter-panel">
        <div class="filter-header">
          <div class="filter-title">Фильтр</div>
          <div class="filter-help"></div>
          <div id="filter-summary" class="filter-summary">Загрузка...</div>
        </div>
        <div class="filter-controls">
          <div class="filter-inline">
            <input id="country-filter" class="filter-search" type="search" list="country-filter-options" placeholder="Поиск страны">
            <button id="clear-country-filter" class="filter-button filter-button-small" type="button">Очистить</button>
          </div>
          <datalist id="country-filter-options"></datalist>
          <input id="node-search" class="filter-search" type="search" placeholder="Поиск по индексу">
          <div class="filter-actions">
            <button id="select-visible" class="filter-button" type="button">Показать выбранные</button>
            <button id="clear-selection" class="filter-button" type="button">Показать все</button>
          </div>
        </div>
        <div id="cluster-chart" class="cluster-chart"></div>
        <div id="node-filter-list" class="filter-list"></div>
      </aside>
      <div id="viz" class="panel"></div>
    </div>
  </div>

  <script>
    const state = {
      allNodes: [],
      allLinks: [],
      countryIndicatorMap: new Map(),
      countryNameMap: new Map(),
      countryLookup: new Map(),
      selectedCountryId: "",
      selectedNodeIds: new Set(),
      visibleNodeIds: []
    };
    const mutedNodeColor = "#c7cdd6";
    const clusterDefinitions = [
      { color: "#D64550", name: "i. Ограниченная индустриализация" },
      { color: "#DBA4EF", name: "ii. Показатели экономики с ограниченной сложностью" },
      { color: "#E5B983", name: "iii. Здоровье и выживаемость" },
      { color: "#4B5563", name: "iv. Начальное образование и здоровье детей" },
      { color: "#74E0D0", name: "v. Базовые услуги и инфраструктура" },
      { color: "#376C8A", name: "vi. Урбанизация и охват социальными услугами" },
      { color: "#008A3E", name: "vii. Качественные институты и инновации" }
    ];

    function num(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function formatTooltipText(value) {
      return String(value || "")
        .replace(/<br\s*\/?>/gi, " | ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getNodeSortNumber(nodeId) {
      const sdgMatch = String(nodeId || "").match(/sdg(\d+)/i);
      if (sdgMatch) {
        return Number(sdgMatch[1]);
      }

      const anyNumberMatch = String(nodeId || "").match(/(\d+)/);
      return anyNumberMatch ? Number(anyNumberMatch[1]) : Number.POSITIVE_INFINITY;
    }

    function compareNodesByIdNumber(a, b) {
      const aNumber = getNodeSortNumber(a.id);
      const bNumber = getNodeSortNumber(b.id);

      if (aNumber !== bNumber) {
        return aNumber - bNumber;
      }

      return a.id.localeCompare(b.id, undefined, { numeric: true });
    }

    function extractId(datum) {
      if (!datum || typeof datum !== "object") return "";
      if (typeof datum.id === "string") return datum.id;
      if (datum.data && typeof datum.data.id === "string") return datum.data.id;
      const meta = datum.__d3plus__;
      if (!meta) return "";
      if (typeof meta.id === "string") return meta.id;
      if (meta.data && typeof meta.data.id === "string") return meta.data.id;
      if (Array.isArray(meta.ids) && meta.ids.length) return String(meta.ids[0]);
      return "";
    }

    function drawTopIdLabels() {
      const svg = document.querySelector("#viz svg");
      if (!svg) return;

      svg.querySelectorAll("text.force-id-label").forEach((n) => n.remove());

      svg.querySelectorAll("circle").forEach((circle) => {
        const parent = circle.parentNode;
        if (!parent || parent.nodeName.toLowerCase() !== "g") return;

        const id = extractId(circle.__data__) || extractId(parent.__data__);
        if (!id) return;

        const cx = Number(circle.getAttribute("cx") || 0);
        const cy = Number(circle.getAttribute("cy") || 0);
        const r = Number(circle.getAttribute("r") || 0);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "force-id-label");
        label.setAttribute("x", String(cx));
        label.setAttribute("y", String(cy - r - 4));
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("dominant-baseline", "alphabetic");
        label.setAttribute("font-family", "Segoe UI, Tahoma, sans-serif");
        label.setAttribute("font-size", "9");
        label.setAttribute("fill", "#1f2937");
        label.setAttribute("stroke", "#ffffff");
        label.setAttribute("stroke-width", "2");
        label.setAttribute("paint-order", "stroke");
        label.style.pointerEvents = "none";
        label.textContent = id;

        parent.appendChild(label);
      });
    }

    function thickenEdges() {
      const svg = document.querySelector("#viz svg");
      if (!svg) return;

      svg.querySelectorAll("path, line").forEach((edge) => {
        edge.style.stroke = "#BFBFBF";
        edge.style.strokeWidth = "3.5px";
        edge.style.opacity = "0.95";
      });
    }

    function scheduleLabelRedraw() {
      setTimeout(() => {
        thickenEdges();
        drawTopIdLabels();
      }, 80);
      setTimeout(() => {
        thickenEdges();
        drawTopIdLabels();
      }, 300);
    }

    function parseEdgesCsv(csvText, validNodeIds) {
      const rows = csvText
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (!rows.length) return [];

      const headers = rows[0].split(",").map((h) => h.trim());
      const uIdx = headers.indexOf("u");
      const vIdx = headers.indexOf("v");
      const simIdx = headers.indexOf("sim");

      if (uIdx < 0 || vIdx < 0) {
        throw new Error("edges.csv must include u and v columns");
      }

      const links = [];
      const seen = new Set();

      for (let i = 1; i < rows.length; i += 1) {
        const cols = rows[i].split(",");
        const rawU = (cols[uIdx] || "").trim();
        const rawV = (cols[vIdx] || "").trim();
        const sim = simIdx >= 0 ? num(cols[simIdx], 0) : 0;

        if (!rawU || !rawV || rawU === rawV) continue;
        if (!validNodeIds.has(rawU) || !validNodeIds.has(rawV)) continue;

        const source = rawU < rawV ? rawU : rawV;
        const target = rawU < rawV ? rawV : rawU;
        const key = source + "|" + target;

        if (seen.has(key)) continue;
        seen.add(key);

        links.push({
          source,
          target,
          sim,
          weight: sim
        });
      }

      return links;
    }

    function parseSpecCsv(csvText) {
      const rows = csvText
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (!rows.length) {
        return {
          countryIndicatorMap: new Map(),
          countryNameMap: new Map()
        };
      }

      const headers = rows[0].split(",").map((h) => h.trim());
      const countryIdx = headers.indexOf("id");
      const indicatorIdx = headers.indexOf("indicator");
      const mcpIdx = headers.indexOf("m_cp");
      const detectedNameRuIdx = headers.findIndex(
        (header) => header === "Название на русском" || header.includes("Название на русском")
      );
      const nameRuIdx = detectedNameRuIdx >= 0 ? detectedNameRuIdx : 4;

      if (countryIdx < 0 || indicatorIdx < 0 || mcpIdx < 0) {
        throw new Error("spec.csv must include id, indicator, and m_cp columns");
      }

      const countryMap = new Map();
      const countryNameMap = new Map();

      for (let i = 1; i < rows.length; i += 1) {
        const cols = rows[i].split(",");
        const countryId = (cols[countryIdx] || "").trim();
        const indicatorId = (cols[indicatorIdx] || "").trim();
        const mcp = (cols[mcpIdx] || "").trim();
        const countryNameRu = nameRuIdx >= 0 ? (cols[nameRuIdx] || "").trim() : "";

        if (!countryId) continue;

        if (!countryMap.has(countryId)) {
          countryMap.set(countryId, new Set());
        }

        if (countryNameRu && !countryNameMap.has(countryId)) {
          countryNameMap.set(countryId, countryNameRu);
        }

        if (indicatorId && mcp === "1") {
          countryMap.get(countryId).add(indicatorId);
        }
      }

      return {
        countryIndicatorMap: countryMap,
        countryNameMap
      };
    }

    function getCountryHighlightedIds() {
      if (!state.selectedCountryId) {
        return new Set();
      }

      const matched = state.countryIndicatorMap.get(state.selectedCountryId);
      return matched ? new Set(matched) : new Set();
    }

    function getCombinedHighlightedIds() {
      const highlighted = getCountryHighlightedIds();

      state.selectedNodeIds.forEach((id) => {
        highlighted.add(id);
      });

      return highlighted;
    }

    function getClusterChartStats() {
      const highlightedIds = getCountryHighlightedIds();

      return clusterDefinitions.map((cluster) => {
        const clusterColor = cluster.color.toUpperCase();
        const clusterNodes = state.allNodes.filter(
          (node) => String(node.color || "").toUpperCase() === clusterColor
        );
        const highlightedCount = clusterNodes.filter((node) => highlightedIds.has(node.id)).length;
        const totalCount = clusterNodes.length;
        const percent = totalCount ? (highlightedCount / totalCount) * 100 : 0;

        return {
          color: cluster.color,
          name: cluster.name,
          highlightedCount,
          totalCount,
          percent
        };
      });
    }

    function renderClusterChart() {
      const container = document.getElementById("cluster-chart");

      if (!state.allNodes.length) {
        container.innerHTML = '<div class="cluster-chart-empty">Загрузка диаграммы...</div>';
        return;
      }

      if (!state.selectedCountryId) {
        container.innerHTML = [
          '<div class="cluster-chart-title">Cluster Coverage</div>',
          '<div class="cluster-chart-help">Процент цветных узлов в каждом кластере для выбранной страны.</div>',
          '<div class="cluster-chart-empty">Выберите страну, чтобы построить распределение по кластерам.</div>'
        ].join("");
        return;
      }

      const rowsHtml = getClusterChartStats().map((cluster) => {
        const percentLabel = cluster.percent.toFixed(1) + "%";
        const metaLabel = cluster.highlightedCount + "/" + cluster.totalCount + " | " + percentLabel;

        return [
          '<div class="cluster-chart-row">',
          '  <div class="cluster-chart-head">',
          '    <div class="cluster-chart-name">',
          '      <span class="cluster-chart-swatch" style="background:' + cluster.color + ';"></span>',
          '      <span>' + cluster.name + '</span>',
          '    </div>',
          '    <div class="cluster-chart-meta">' + metaLabel + '</div>',
          '  </div>',
          '  <div class="cluster-chart-track">',
          '    <div class="cluster-chart-fill" style="width:' + cluster.percent + '%; background:' + cluster.color + ';"></div>',
          '  </div>',
          '</div>'
        ].join("");
      }).join("");

      container.innerHTML = [
        '<div class="cluster-chart-title">Cluster Coverage</div>',
        '<div class="cluster-chart-help">Доля узлов с <code>m_cp = 1</code> в каждом кластере для выбранной страны.</div>',
        '<div class="cluster-chart-list">' + rowsHtml + '</div>'
      ].join("");
    }

    function getCountryDisplayLabel(countryId) {
      const nameRu = state.countryNameMap.get(countryId);
      return nameRu ? nameRu + " (" + countryId + ")" : countryId;
    }

    function syncCountryFilterInput() {
      const input = document.getElementById("country-filter");
      input.value = state.selectedCountryId ? getCountryDisplayLabel(state.selectedCountryId) : "";
    }

    function populateCountryFilter() {
      const datalist = document.getElementById("country-filter-options");
      const countries = Array.from(state.countryIndicatorMap.keys()).sort((a, b) =>
        getCountryDisplayLabel(a).localeCompare(getCountryDisplayLabel(b), "ru")
      );

      datalist.innerHTML = "";
      state.countryLookup.clear();

      countries.forEach((countryId) => {
        const option = document.createElement("option");
        const label = getCountryDisplayLabel(countryId);
        option.value = label;
        datalist.appendChild(option);

        state.countryLookup.set(label, countryId);
        state.countryLookup.set(countryId, countryId);
      });

      syncCountryFilterInput();
    }

    function updateStatus() {
      const status = document.getElementById("status");
      const countryText = state.selectedCountryId ? getCountryDisplayLabel(state.selectedCountryId) : "none";
      const manualText = state.selectedNodeIds.size
        ? String(state.selectedNodeIds.size)
        : "none";
      const countryHighlighted = getCountryHighlightedIds().size;

      status.textContent =
        "Nodes: " + state.allNodes.length +
        " | Edges: " + state.allLinks.length +
        " | Country: " + countryText +
        " | m_cp=1: " + countryHighlighted +
        " | Manual: " + manualText;
    }

    function updateFilterSummary() {
      const summary = document.getElementById("filter-summary");
      const countryText = state.selectedCountryId ? getCountryDisplayLabel(state.selectedCountryId) : "none";
      const countryHighlighted = getCountryHighlightedIds().size;

      if (!state.allNodes.length) {
        summary.textContent = "Loading nodes...";
        return;
      }

      if (!state.selectedNodeIds.size && !state.selectedCountryId) {
        summary.textContent =
          "Ничего не выбрано. " + state.visibleNodeIds.length + " совпадают с фильтром.";
        return;
      }

      summary.textContent =
        "Country: " + countryText +
        " | m_cp=1 nodes: " + countryHighlighted +
        " | Manual: " + state.selectedNodeIds.size +
        " | Search matches: " + state.visibleNodeIds.length;
    }

    function getDisplayNodes() {
      const highlightedIds = getCombinedHighlightedIds();

      if (!highlightedIds.size) {
        return state.allNodes.map((node) => ({
          ...node,
          displayColor: node.color
        }));
      }

      return state.allNodes.map((node) => ({
        ...node,
        displayColor: highlightedIds.has(node.id) ? node.color : mutedNodeColor
      }));
    }

    function renderNetwork(nodes, links) {
      const viz = document.getElementById("viz");
      viz.innerHTML = "";

      new d3plus.Network()
        .select("#viz")
        .nodes(nodes)
        .links(links)
        .x("x")
        .y("y")
        .size((d) => (d.size ? +d.size * 1.05 : 5))
        .sizeMin(2)
        .sizeMax(14)
        .label(() => "")
        .shapeConfig({
          fill: (d) => d.displayColor || d.color,
          stroke: "#ffffff",
          strokeWidth: 1,
          labelConfig: {
            fontResize: true,
            fontSize: 11,
            padding: 0
          }
        })
        .tooltipConfig({
          width: 520,
          title: (d) => d.label || d.id,
          titleStyle: {
            "max-width": "100%",
            "white-space": "normal",
            "word-break": "break-word",
            "line-height": "1.35"
          },
          body: (d) => formatTooltipText(d.title),
          bodyStyle: {
            "max-width": "100%",
            "white-space": "normal",
            "word-break": "break-word",
            "line-height": "1.4",
            "margin-top": "8px"
          },
          tableStyle: {
            width: "100%",
            "table-layout": "auto"
          },
          tdStyle: {
            "white-space": "normal",
            "word-break": "break-word",
            "vertical-align": "top",
            "line-height": "1.35"
          },
          tbody: [
            ["ID", (d) => d.id]
          ]
        })
        .render();

      updateStatus();
      scheduleLabelRedraw();
    }

    function applySelectionColoring() {
      renderNetwork(getDisplayNodes(), state.allLinks);
      updateFilterSummary();
      renderClusterChart();
    }

    function createFilterItem(node) {
      const item = document.createElement("label");
      item.className = "filter-item";
      item.title = node.label || node.id;

      const input = document.createElement("input");
      input.type = "checkbox";
      input.value = node.id;
      input.checked = state.selectedNodeIds.has(node.id);
      input.addEventListener("change", () => {
        if (input.checked) {
          state.selectedNodeIds.add(node.id);
        } else {
          state.selectedNodeIds.delete(node.id);
        }

        applySelectionColoring();
      });

      const textWrap = document.createElement("div");

      const idText = document.createElement("div");
      idText.className = "filter-item-id";
      idText.textContent = node.id;
      textWrap.appendChild(idText);

      if (node.label && node.label !== node.id) {
        const labelText = document.createElement("div");
        labelText.className = "filter-item-label";
        labelText.textContent = node.label;
        textWrap.appendChild(labelText);
      }

      item.appendChild(input);
      item.appendChild(textWrap);

      return item;
    }

    function renderFilterList() {
      const list = document.getElementById("node-filter-list");
      const query = document.getElementById("node-search").value.trim().toLowerCase();

      list.innerHTML = "";

      const matchingNodes = state.allNodes.filter((node) => {
        if (!query) return true;

        return (
          node.id.toLowerCase().includes(query) ||
          (node.label || "").toLowerCase().includes(query)
        );
      });

      state.visibleNodeIds = matchingNodes.map((node) => node.id);

      if (!matchingNodes.length) {
        const empty = document.createElement("div");
        empty.className = "filter-empty";
        empty.textContent = "No nodes match the current search.";
        list.appendChild(empty);
        updateFilterSummary();
        return;
      }

      matchingNodes.forEach((node) => {
        list.appendChild(createFilterItem(node));
      });

      updateFilterSummary();
    }

    async function main() {
      document.getElementById("status").textContent = "Loading nodes.json, edges.csv, and spec.csv...";

      const [nodesResponse, edgesResponse, specResponse] = await Promise.all([
        fetch("nodes.json", { cache: "no-store" }),
        fetch("edges.csv", { cache: "no-store" }),
        fetch("spec.csv", { cache: "no-store" })
      ]);

      if (!nodesResponse.ok) {
        throw new Error("Could not load nodes.json");
      }

      if (!edgesResponse.ok) {
        throw new Error("Could not load edges.csv");
      }

      if (!specResponse.ok) {
        throw new Error("Could not load spec.csv");
      }

      const rawNodes = await nodesResponse.json();
      const edgesCsv = await edgesResponse.text();
      const specCsv = await specResponse.text();

      const nodes = rawNodes
        .filter((d) => d && d.id)
        .map((d) => ({
          id: d.id,
          label: d.label || d.id,
          title: d.title || "",
          x: num(d.x, 0),
          y: num(d.y, 0),
          size: num(d.size, 5),
          color: d.color || "#4e79a7",
          value: num(d.value, 0)
        }));

      const validNodeIds = new Set(nodes.map((n) => n.id));
      const links = parseEdgesCsv(edgesCsv, validNodeIds);
      const specData = parseSpecCsv(specCsv);

      state.allNodes = nodes
        .slice()
        .sort(compareNodesByIdNumber);
      state.allLinks = links;
      state.countryIndicatorMap = specData.countryIndicatorMap;
      state.countryNameMap = specData.countryNameMap;

      populateCountryFilter();
      renderClusterChart();

      const countryFilter = document.getElementById("country-filter");
      const applyCountryFilter = () => {
        const rawValue = countryFilter.value.trim();

        if (!rawValue) {
          state.selectedCountryId = "";
          applySelectionColoring();
          return;
        }

        const matchedCountryId = state.countryLookup.get(rawValue);
        if (!matchedCountryId) {
          return;
        }

        state.selectedCountryId = matchedCountryId;
        syncCountryFilterInput();
        applySelectionColoring();
      };

      countryFilter.addEventListener("change", applyCountryFilter);
      countryFilter.addEventListener("input", () => {
        if (!countryFilter.value.trim()) {
          state.selectedCountryId = "";
          applySelectionColoring();
        }
      });
      document.getElementById("clear-country-filter").addEventListener("click", () => {
        state.selectedCountryId = "";
        syncCountryFilterInput();
        applySelectionColoring();
      });
      document.getElementById("node-search").addEventListener("input", renderFilterList);
      document.getElementById("select-visible").addEventListener("click", () => {
        state.visibleNodeIds.forEach((id) => state.selectedNodeIds.add(id));
        renderFilterList();
        applySelectionColoring();
      });
      document.getElementById("clear-selection").addEventListener("click", () => {
        state.selectedCountryId = "";
        state.selectedNodeIds.clear();
        syncCountryFilterInput();
        renderFilterList();
        applySelectionColoring();
      });

      renderFilterList();
      applySelectionColoring();

      window.addEventListener("resize", () => setTimeout(drawTopIdLabels, 120));
      document.getElementById("viz").addEventListener("mouseup", () => setTimeout(drawTopIdLabels, 90));
      document.getElementById("viz").addEventListener("wheel", () => setTimeout(drawTopIdLabels, 90), { passive: true });
    }
  
    main().catch((err) => {
      document.getElementById("status").textContent = "Error: " + err.message;
      console.error(err);
    });
    
  </script>
</body>
</html>
